<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Admin — KelasaGaara</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--s:#E8600A;--sl:#FEF0E6;--j:#2D6A4F;--jl:#E8F5EE;--bg:#0F0F1A;--sur:#16162A;--bdr:rgba(255,255,255,0.08);--mut:rgba(255,255,255,0.45)}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:#fff;min-height:100vh;display:flex;flex-direction:column}
/* Topbar */
.topbar{background:var(--sur);border-bottom:1px solid var(--bdr);padding:0 28px;height:58px;display:flex;align-items:center;justify-content:space-between}
.brand{font-weight:800;font-size:1rem;color:#fff}.brand em{color:var(--s);font-style:normal}
.topbar-right{display:flex;align-items:center;gap:12px}
.badge{background:rgba(232,96,10,.15);border:1px solid rgba(232,96,10,.35);color:var(--s);padding:3px 10px;border-radius:20px;font-size:.75rem;font-weight:700}
.btn{padding:7px 16px;border-radius:8px;font-size:.82rem;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;border:none;transition:.2s}
.btn-ghost{background:rgba(255,255,255,.07);color:rgba(255,255,255,.7);border:1px solid var(--bdr)}.btn-ghost:hover{background:rgba(255,255,255,.13);color:#fff}
.btn-s{background:var(--s);color:#fff}.btn-s:hover{background:#C04E06}
.btn-red{background:#DC2626;color:#fff;font-size:.75rem;padding:5px 11px}.btn-red:hover{background:#B91C1C}
.btn-edit{background:rgba(232,96,10,.15);color:var(--s);border:1px solid rgba(232,96,10,.3);font-size:.75rem;padding:5px 11px}
/* Tabs */
.tabs{background:var(--sur);border-bottom:1px solid var(--bdr);padding:0 28px;display:flex;gap:4px}
.tab{padding:14px 18px;font-size:.85rem;font-weight:600;color:var(--mut);cursor:pointer;border-bottom:2px solid transparent;transition:.2s}
.tab.active{color:var(--s);border-bottom-color:var(--s)}
/* Page */
.page{max-width:1100px;margin:28px auto;padding:0 24px;width:100%}
/* Stats */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:28px}
.stat{background:var(--sur);border:1px solid var(--bdr);border-radius:12px;padding:18px;text-align:center}
.stat-n{font-size:2rem;font-weight:800;line-height:1}.stat-n.o{color:var(--s)}.stat-n.g{color:#34D399}.stat-n.b{color:#60A5FA}.stat-n.p{color:#A78BFA}
.stat-l{color:var(--mut);font-size:.78rem;margin-top:4px}
/* Table */
.tbl-wrap{background:var(--sur);border:1px solid var(--bdr);border-radius:14px;overflow:hidden}
.tbl-head{background:rgba(255,255,255,.04);display:flex;align-items:center;padding:10px 18px;gap:10px;border-bottom:1px solid var(--bdr)}
.tbl-head input{flex:1;background:rgba(255,255,255,.07);border:1px solid var(--bdr);border-radius:8px;padding:8px 12px;font-size:.84rem;color:#fff;font-family:'DM Sans',sans-serif;outline:none}
.tbl-head select{background:rgba(255,255,255,.07);border:1px solid var(--bdr);border-radius:8px;padding:8px 12px;font-size:.82rem;color:#fff;font-family:'DM Sans',sans-serif;outline:none;cursor:pointer}
table{width:100%;border-collapse:collapse}
thead th{padding:11px 16px;text-align:left;font-size:.72rem;text-transform:uppercase;letter-spacing:.05em;color:var(--mut);border-bottom:1px solid var(--bdr)}
tbody tr{border-bottom:1px solid var(--bdr);transition:.15s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:rgba(255,255,255,.03)}
td{padding:12px 16px;font-size:.85rem;vertical-align:middle}
.avatar{width:34px;height:34px;border-radius:50%;border:2px solid var(--bdr);object-fit:cover;flex-shrink:0}
.av-ph{width:34px;height:34px;border-radius:50%;background:rgba(232,96,10,.2);border:2px solid rgba(232,96,10,.3);display:flex;align-items:center;justify-content:center;font-size:.82rem;font-weight:700;color:var(--s)}
.user-cell{display:flex;align-items:center;gap:10px}
.u-name{font-weight:600;font-size:.87rem}.u-email{font-size:.74rem;color:var(--mut)}
.rbadge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:.72rem;font-weight:700}
.rw{background:rgba(45,106,79,.2);color:#6EE7B7;border:1px solid rgba(45,106,79,.4)}
.rh{background:rgba(232,96,10,.15);color:#FDBA74;border:1px solid rgba(232,96,10,.3)}
.actions{display:flex;gap:6px}
/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:999;display:none}
.modal-bg.open{display:flex}
.modal{background:var(--sur);border:1px solid var(--bdr);border-radius:16px;padding:28px;width:460px;max-height:90vh;overflow-y:auto}
.modal h2{font-size:1.1rem;font-weight:700;margin-bottom:20px}
.fg{margin-bottom:14px}
.fg label{display:block;font-size:.78rem;font-weight:600;color:var(--mut);margin-bottom:5px}
.fg input,.fg select{width:100%;padding:10px 13px;background:rgba(255,255,255,.07);border:1px solid var(--bdr);border-radius:8px;color:#fff;font-size:.86rem;font-family:'DM Sans',sans-serif;outline:none}
.fg input:focus,.fg select:focus{border-color:var(--s)}
.fg select option{background:var(--sur)}
.modal-btns{display:flex;gap:10px;margin-top:20px}
.modal-btns button{flex:1;padding:11px;border-radius:10px;font-size:.9rem;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;border:none}
/* Jobs section */
.job-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--bdr)}
.job-row:last-child{border-bottom:none}
.job-emoji{font-size:1.4rem}
.job-title{font-weight:600;font-size:.87rem}.job-meta{font-size:.76rem;color:var(--mut);margin-top:2px}
.pay{font-weight:700;color:#34D399;font-size:.92rem;margin-left:auto}
/* Loading */
.loading{text-align:center;padding:40px;color:var(--mut)}
.spinner{width:28px;height:28px;border:3px solid var(--bdr);border-top-color:var(--s);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
/* Toast */
#toast{position:fixed;bottom:20px;right:20px;padding:12px 20px;border-radius:10px;font-size:.86rem;transform:translateY(60px);opacity:0;transition:.3s;z-index:9999}
#toast.show{transform:translateY(0);opacity:1}
#toast.s{background:var(--j);color:#fff}#toast.e{background:#DC2626;color:#fff}#toast.i{background:#1F2937;color:#fff}
</style>
</head>
<body>
<div class="topbar">
  <div class="brand">Kelasa<em>Gaara</em> <span style="font-size:.75rem;color:var(--mut);font-weight:400;margin-left:6px">Admin Panel</span></div>
  <div class="topbar-right">
    <span class="badge">SUPER ADMIN</span>
    <span id="admin-name" style="font-size:.84rem;color:var(--mut)"></span>
    <button class="btn btn-ghost" onclick="doLogout()">Logout</button>
  </div>
</div>

<div class="tabs">
  <div class="tab active" onclick="showTab('users',this)">👥 Users</div>
  <div class="tab" onclick="showTab('jobs',this)">💼 Jobs</div>
</div>

<div class="page">
  <!-- Stats -->
  <div class="stats">
    <div class="stat"><div class="stat-n o" id="s-total">—</div><div class="stat-l">Total Users</div></div>
    <div class="stat"><div class="stat-n g" id="s-workers">—</div><div class="stat-l">Workers</div></div>
    <div class="stat"><div class="stat-n b" id="s-hirers">—</div><div class="stat-l">Hirers</div></div>
    <div class="stat"><div class="stat-n p" id="s-jobs">—</div><div class="stat-l">Jobs Posted</div></div>
  </div>

  <!-- Users Tab -->
  <div id="tab-users">
    <div class="tbl-wrap">
      <div class="tbl-head">
        <input id="search-user" placeholder="🔍 Search by name or email…" oninput="filterUsers()"/>
        <select id="filter-role" onchange="filterUsers()">
          <option value="">All Roles</option>
          <option value="worker">Workers</option>
          <option value="hirer">Hirers</option>
        </select>
      </div>
      <table>
        <thead><tr>
          <th>User</th><th>Role</th><th>District</th><th>Trade / Skills</th><th>Experience</th><th>Rate</th><th>Actions</th>
        </tr></thead>
        <tbody id="users-tbody"><tr><td colspan="7"><div class="loading"><div class="spinner"></div>Loading…</div></td></tr></tbody>
      </table>
    </div>
  </div>

  <!-- Jobs Tab -->
  <div id="tab-jobs" style="display:none">
    <div class="tbl-wrap">
      <div style="padding:16px 20px;border-bottom:1px solid var(--bdr);font-weight:700">All Posted Jobs</div>
      <div id="jobs-list" style="padding:0 20px"><div class="loading"><div class="spinner"></div>Loading…</div></div>
    </div>
  </div>
</div>

<!-- Edit Modal -->
<div class="modal-bg" id="edit-modal">
  <div class="modal">
    <h2>✏️ Edit User</h2>
    <div class="fg"><label>Name</label><input id="m-name" type="text"/></div>
    <div class="fg"><label>Role</label>
      <select id="m-role"><option value="worker">Worker</option><option value="hirer">Hirer</option></select>
    </div>
    <div class="fg"><label>District</label>
      <select id="m-district"><option value="">Select District</option></select>
    </div>
    <div class="fg"><label>Taluk</label><input id="m-taluk" type="text"/></div>
    <div class="fg"><label>Trade / Primary Skill</label><input id="m-skill" type="text" placeholder="e.g. Mason, Plumber"/></div>
    <div class="fg"><label>Experience</label>
      <select id="m-exp">
        <option value="">—</option>
        <option>Less than 1 Year</option><option>1–2 Years</option>
        <option>3–5 Years</option><option>5–10 Years</option><option>10+ Years</option>
      </select>
    </div>
    <div class="fg"><label>Daily Rate (₹)</label><input id="m-rate" type="number"/></div>
    <div class="fg"><label>Phone</label><input id="m-phone" type="tel"/></div>
    <div class="modal-btns">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-s" onclick="saveEdit()">💾 Save Changes</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script type="module">
import { auth, db } from './js/firebase-config.js';
import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { collection, getDocs, doc, updateDoc, deleteDoc, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const ADMINS = ['anandakiccha240@gmail.com','anandaananda16919@gmail.com'];
const DISTRICTS = ["Bagalkot","Ballari","Belagavi","Bengaluru Rural","Bengaluru Urban","Bidar","Chamarajanagar","Chikkaballapura","Chikkamagaluru","Chitradurga","Dakshina Kannada","Davanagere","Dharwad","Gadag","Hassan","Haveri","Kalaburagi","Kodagu","Kolar","Koppal","Mandya","Mysuru","Raichur","Ramanagara","Shivamogga","Tumakuru","Udupi","Uttara Kannada","Vijayapura","Yadgir","Vijayanagara"];
const EMOJI = {Mason:"🧱",Plumber:"🔧",Electrician:"⚡",Carpenter:"🪵",Painter:"🎨",Driver:"🚗",Cook:"🍳",Gardener:"🌿","Security Guard":"🔒",Helper:"🤝",Labour:"🏗️"};

let allUsers=[], allJobs=[], editUID='';

// Populate district in modal
const mDist = document.getElementById('m-district');
DISTRICTS.forEach(d=>{const o=document.createElement('option');o.value=d;o.textContent=d;mDist.appendChild(o);});

// Auth guard
onAuthStateChanged(auth, async user=>{
  if(!user){window.location.href='admin-login.html';return;}
  if(!ADMINS.includes(user.email)){await signOut(auth);window.location.href='admin-login.html';return;}
  document.getElementById('admin-name').textContent=user.displayName||user.email;
  await Promise.all([loadUsers(),loadJobs()]);
});

async function loadUsers(){
  const snap=await getDocs(collection(db,'users'));
  allUsers=snap.docs.map(d=>({...d.data(),uid:d.id}));
  const workers=allUsers.filter(u=>u.role==='worker').length;
  const hirers=allUsers.filter(u=>u.role==='hirer').length;
  document.getElementById('s-total').textContent=allUsers.length;
  document.getElementById('s-workers').textContent=workers;
  document.getElementById('s-hirers').textContent=hirers;
  renderUsers(allUsers);
}

async function loadJobs(){
  const snap=await getDocs(collection(db,'jobs'));
  allJobs=snap.docs.map(d=>({...d.data(),id:d.id}));
  document.getElementById('s-jobs').textContent=allJobs.length;
  renderJobs();
}

function renderUsers(users){
  const tb=document.getElementById('users-tbody');
  if(!users.length){tb.innerHTML='<tr><td colspan="7" style="text-align:center;padding:30px;color:rgba(255,255,255,.4)">No users found.</td></tr>';return;}
  tb.innerHTML=users.map(u=>{
    const init=(u.name||'?')[0].toUpperCase();
    const av=u.photo?`<img class="avatar" src="${u.photo}" onerror="this.outerHTML='<div class=av-ph>${init}</div>'">`:`<div class="av-ph">${init}</div>`;
    const rb=u.role==='worker'?`<span class="rbadge rw">👷 Worker</span>`:`<span class="rbadge rh">🏗️ Hirer</span>`;
    const skills=(u.skills||[]).join(', ')||'—';
    return `<tr>
      <td><div class="user-cell">${av}<div><div class="u-name">${esc(u.name||'—')}</div><div class="u-email">${esc(u.email||'')}</div></div></div></td>
      <td>${rb}</td>
      <td style="font-size:.82rem">${u.district||'—'}</td>
      <td style="font-size:.82rem">${skills}</td>
      <td style="font-size:.82rem">${u.experience||'—'}</td>
      <td style="font-size:.82rem">${u.dailyRate?'₹'+u.dailyRate:'—'}</td>
      <td><div class="actions">
        <button class="btn btn-edit" onclick="openEdit('${u.uid}')">✏️ Edit</button>
        <button class="btn btn-red" onclick="removeUser('${u.uid}','${esc(u.name||u.email)}')">🗑️</button>
      </div></td>
    </tr>`;
  }).join('');
}

function renderJobs(){
  const el=document.getElementById('jobs-list');
  if(!allJobs.length){el.innerHTML='<div class="loading">No jobs posted yet.</div>';return;}
  el.innerHTML=allJobs.map(j=>{
    const em=EMOJI[j.category]||'💼';
    const apps=(j.applicants||[]).length;
    return `<div class="job-row">
      <span class="job-emoji">${em}</span>
      <div style="flex:1">
        <div class="job-title">${esc(j.title||'Untitled')}</div>
        <div class="job-meta">📍 ${j.district||'—'} · ${j.category||'—'} · by ${esc(j.hirerName||'Hirer')} · ${apps} applicant${apps!==1?'s':''}</div>
      </div>
      <span class="pay">₹${j.pay||'—'}/day</span>
      <button class="btn btn-red" onclick="removeJob('${j.id}')">🗑️</button>
    </div>`;
  }).join('');
}

window.filterUsers=function(){
  const s=document.getElementById('search-user').value.toLowerCase();
  const r=document.getElementById('filter-role').value;
  let f=allUsers;
  if(r) f=f.filter(u=>u.role===r);
  if(s) f=f.filter(u=>(u.name||'').toLowerCase().includes(s)||(u.email||'').toLowerCase().includes(s));
  renderUsers(f);
};

window.openEdit=function(uid){
  editUID=uid;
  const u=allUsers.find(x=>x.uid===uid);
  if(!u) return;
  document.getElementById('m-name').value=u.name||'';
  document.getElementById('m-role').value=u.role||'worker';
  document.getElementById('m-district').value=u.district||'';
  document.getElementById('m-taluk').value=u.taluk||'';
  document.getElementById('m-skill').value=(u.skills&&u.skills[0])||'';
  document.getElementById('m-exp').value=u.experience||'';
  document.getElementById('m-rate').value=u.dailyRate||'';
  document.getElementById('m-phone').value=u.phone||'';
  document.getElementById('edit-modal').classList.add('open');
};

window.closeModal=function(){document.getElementById('edit-modal').classList.remove('open');};

window.saveEdit=async function(){
  if(!editUID) return;
  const skill=document.getElementById('m-skill').value.trim();
  const updates={
    name:document.getElementById('m-name').value.trim(),
    role:document.getElementById('m-role').value,
    district:document.getElementById('m-district').value,
    taluk:document.getElementById('m-taluk').value.trim(),
    experience:document.getElementById('m-exp').value,
    dailyRate:parseInt(document.getElementById('m-rate').value)||0,
    phone:document.getElementById('m-phone').value.trim()||null,
    updatedAt:serverTimestamp()
  };
  if(skill) updates.skills=[skill];
  try{
    await updateDoc(doc(db,'users',editUID),updates);
    const idx=allUsers.findIndex(u=>u.uid===editUID);
    if(idx>-1) Object.assign(allUsers[idx],updates);
    closeModal();
    renderUsers(allUsers);
    toast('User updated ✅','s');
  }catch(e){toast('Failed: '+e.message,'e');}
};

window.removeUser=async function(uid,name){
  if(!confirm(`Delete user "${name}"? This cannot be undone.`)) return;
  try{
    await deleteDoc(doc(db,'users',uid));
    allUsers=allUsers.filter(u=>u.uid!==uid);
    document.getElementById('s-total').textContent=allUsers.length;
    document.getElementById('s-workers').textContent=allUsers.filter(u=>u.role==='worker').length;
    document.getElementById('s-hirers').textContent=allUsers.filter(u=>u.role==='hirer').length;
    renderUsers(allUsers);
    toast('User removed','i');
  }catch(e){toast('Failed: '+e.message,'e');}
};

window.removeJob=async function(id){
  if(!confirm('Delete this job posting?')) return;
  try{
    await deleteDoc(doc(db,'jobs',id));
    allJobs=allJobs.filter(j=>j.id!==id);
    document.getElementById('s-jobs').textContent=allJobs.length;
    renderJobs();
    toast('Job removed','i');
  }catch(e){toast('Failed','e');}
};

window.showTab=function(tab,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tab-users').style.display=tab==='users'?'block':'none';
  document.getElementById('tab-jobs').style.display=tab==='jobs'?'block':'none';
};

window.doLogout=async function(){await signOut(auth);window.location.href='admin-login.html';};

function toast(msg,type){const el=document.getElementById('toast');el.textContent=msg;el.className=`show ${type}`;setTimeout(()=>el.className='',3000);}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
</script>
</body>
</html>
