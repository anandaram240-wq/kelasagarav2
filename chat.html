<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Chat — KelasaGaara</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+Tamma+2:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',sans-serif;background:var(--paper);min-height:100vh}
    .navbar{background:#fff;border-bottom:1px solid var(--border);padding:0 28px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,0.06)}
    .brand{font-family:'Baloo Tamma 2',sans-serif;font-weight:800;font-size:1.1rem;color:var(--ink);text-decoration:none}
    .brand span{color:var(--saffron)}
    .btn-back{padding:7px 14px;background:transparent;border:1.5px solid var(--border);border-radius:8px;font-size:0.82rem;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;color:var(--muted);text-decoration:none;transition:all 0.2s}
    .btn-back:hover{border-color:var(--saffron);color:var(--saffron)}
    .chat-wrap{max-width:680px;margin:24px auto;padding:0 16px}
    .chat-info-bar{background:#fff;border:1px solid var(--border);border-radius:14px;padding:12px 16px;margin-bottom:12px;font-size:0.82rem;color:var(--muted);display:flex;align-items:center;gap:8px}
    .chat-container{border-radius:14px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,0.1)}
    .emoji-picker-wrap{display:none;background:#fff;border:1px solid var(--border);border-radius:10px;padding:10px;margin-bottom:6px;display:flex;flex-wrap:wrap;gap:6px}
    .emoji-picker-wrap.show{display:flex}
    .emoji-picker-wrap span{font-size:1.4rem;cursor:pointer;padding:4px;border-radius:6px;transition:background 0.15s}
    .emoji-picker-wrap span:hover{background:var(--paper)}
    .access-denied{text-align:center;padding:60px 20px;color:var(--muted)}
    .access-denied .icon{font-size:3rem;margin-bottom:12px}
  </style>
</head>
<body>
<nav class="navbar">
  <a href="javascript:history.back()" class="brand" style="font-size:0.95rem">← Back</a>
  <a href="index.html" class="brand" style="font-size:1rem">Kelasa<span>Gaara</span></a>
  <div style="width:60px"></div>
</nav>

<div class="chat-wrap">
  <div id="access-denied" class="access-denied" style="display:none">
    <div class="icon">🔒</div>
    <h3 style="font-family:'Baloo Tamma 2',cursive;margin-bottom:8px">Chat Locked</h3>
    <p>You are not part of this booking, or the booking does not exist.</p>
    <a href="hirer-dashboard.html" style="color:var(--saffron);display:block;margin-top:16px">← Back to Dashboard</a>
  </div>

  <div id="chat-area" style="display:none">
    <div class="chat-info-bar">
      📋 Booking: <strong id="chat-job-title">—</strong> &nbsp;|&nbsp; 📅 <span id="chat-date">—</span>
    </div>
    <div class="chat-container">
      <!-- Header -->
      <div class="chat-header">
        <div class="chat-other-avatar" id="chat-avatar">?</div>
        <div>
          <div class="chat-other-name" id="chat-other-name">Loading…</div>
          <div class="chat-status" id="chat-status">● Online</div>
        </div>
      </div>
      <!-- Messages -->
      <div class="chat-messages" id="chat-messages">
        <div style="text-align:center;color:var(--muted);font-size:0.82rem;padding:20px">Loading messages…</div>
      </div>
      <!-- Emoji picker -->
      <div class="emoji-picker-wrap" id="emoji-picker">
        <span onclick="addEmoji('😊')">😊</span><span onclick="addEmoji('👍')">👍</span><span onclick="addEmoji('🙏')">🙏</span><span onclick="addEmoji('✅')">✅</span><span onclick="addEmoji('❌')">❌</span>
        <span onclick="addEmoji('📅')">📅</span><span onclick="addEmoji('📍')">📍</span><span onclick="addEmoji('💰')">💰</span><span onclick="addEmoji('🔧')">🔧</span><span onclick="addEmoji('🏗️')">🏗️</span>
        <span onclick="addEmoji('👷')">👷</span><span onclick="addEmoji('🎨')">🎨</span><span onclick="addEmoji('⚡')">⚡</span><span onclick="addEmoji('🚗')">🚗</span><span onclick="addEmoji('🍳')">🍳</span>
        <span onclick="addEmoji('🔒')">🔒</span><span onclick="addEmoji('🌿')">🌿</span><span onclick="addEmoji('🤝')">🤝</span><span onclick="addEmoji('⭐')">⭐</span><span onclick="addEmoji('❤️')">❤️</span>
      </div>
      <!-- Input bar -->
      <div class="chat-input-bar">
        <button class="chat-emoji-btn" onclick="toggleEmoji()" title="Emoji">😊</button>
        <input class="chat-text-input" id="msg-input" type="text" placeholder="Type a message…" onkeydown="if(event.key==='Enter')sendMsg()"/>
        <button class="chat-send-btn" onclick="sendMsg()">Send ➤</button>
      </div>
    </div>
  </div>
</div>

<div id="toast-container"></div>

<script type="module">
  import { auth, db, rtdb } from './js/firebase-config.js';
  import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  import { sendMessage, listenMessages, markMessagesRead, setOnlineStatus, listenOnlineStatus } from './js/chat.js';
  import { ref, onDisconnect, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const params    = new URLSearchParams(window.location.search);
  const bookingId = params.get('booking');
  if (!bookingId) { window.location.href='index.html'; }

  let currentUser=null, myRole=null, otherUid=null, booking=null;

  function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
  function fmtTime(ts){if(!ts)return'';const d=new Date(ts);return d.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});}

  onAuthStateChanged(auth, async user => {
    if(!user){window.location.href='login.html';return;}
    currentUser=user;

    // Load booking
    const bSnap = await getDoc(doc(db,'bookings',bookingId));
    if(!bSnap.exists()){document.getElementById('access-denied').style.display='block';return;}
    booking = bSnap.data();

    // Determine role
    if(booking.hirerId === user.uid)      { myRole='hirer';  otherUid=booking.workerId; }
    else if(booking.workerId === user.uid){ myRole='worker'; otherUid=booking.hirerId; }
    else { document.getElementById('access-denied').style.display='block'; return; }

    // Load other user info
    const otherSnap = await getDoc(doc(db,'users',otherUid));
    const other     = otherSnap.exists() ? otherSnap.data() : {};

    document.getElementById('chat-job-title').textContent = booking.jobTitle || '—';
    document.getElementById('chat-date').textContent      = booking.date || '—';
    document.getElementById('chat-other-name').textContent= other.name || 'User';
    const initials = (other.name||'U').split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase();
    document.getElementById('chat-avatar').textContent    = initials;

    document.getElementById('chat-area').style.display = 'block';

    // Online presence
    setOnlineStatus(user.uid, true);
    onDisconnect(ref(rtdb, `presence/${user.uid}`)).update({online:false, lastSeen: Date.now()});
    listenOnlineStatus(otherUid, status => {
      const el = document.getElementById('chat-status');
      if(status.online){ el.textContent='● Online'; el.className='chat-status'; }
      else { el.textContent='○ Offline'; el.className='chat-status offline'; }
    });

    // Listen messages
    listenMessages(bookingId, msgs => {
      renderMessages(msgs, user.uid);
      // Mark received messages as read
      const unread = msgs.filter(m=>m.receiverId===user.uid&&!m.isRead).map(m=>m.id);
      if(unread.length) markMessagesRead(bookingId, unread, user.uid);
    });
  });

  function renderMessages(msgs, myUid){
    const container = document.getElementById('chat-messages');
    if(!msgs.length){
      container.innerHTML='<div style="text-align:center;color:var(--muted);font-size:0.82rem;padding:30px">No messages yet. Say hello! 👋</div>';
      return;
    }
    container.innerHTML = msgs.map(m=>{
      const isSent = m.senderId === myUid;
      const seen = isSent && m.isRead ? '<span class="msg-seen">✓✓ Seen</span>' : isSent ? '<span style="color:var(--muted);font-size:0.7rem">✓ Sent</span>' : '';
      return `<div class="msg-bubble ${isSent?'sent':'recv'}">
        <div class="msg-text">${esc(m.messageText)}</div>
        <div class="msg-meta">${fmtTime(m.timestamp)} ${seen}</div>
      </div>`;
    }).join('');
    container.scrollTop = container.scrollHeight;
  }

  window.sendMsg = async function(){
    const input = document.getElementById('msg-input');
    const text  = input.value.trim();
    if(!text || !currentUser || !otherUid) return;
    input.value = '';
    try {
      await sendMessage(bookingId, currentUser.uid, myRole, otherUid, text);
    } catch(e){ console.error(e); showToast('Failed to send message','error'); }
  };

  window.toggleEmoji = function(){
    const ep = document.getElementById('emoji-picker');
    ep.classList.toggle('show');
  };
  window.addEmoji = function(e){
    const input = document.getElementById('msg-input');
    input.value += e; input.focus();
  };

  function showToast(msg,type='info'){
    let c=document.getElementById('toast-container');
    const colors={success:'#1B6B45',error:'#C0392B',info:'#E8590C'};
    const t=document.createElement('div');
    t.style.cssText=`min-width:240px;padding:11px 16px;background:${colors[type]};color:#fff;border-radius:10px;font-size:0.88rem;font-weight:500;display:flex;align-items:center;gap:8px;animation:toastIn 0.3s ease;box-shadow:0 8px 24px rgba(0,0,0,0.15)`;
    t.innerHTML=`<span>${msg}</span>`;
    c.appendChild(t);
    setTimeout(()=>t.remove(),3000);
  }
</script>
<style>@keyframes toastIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}</style>
</body>
</html>
