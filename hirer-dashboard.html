<!DOCTYPE html>
<!--
  hirer-dashboard.html — Hirer's Dashboard
  Shows bookings made, posted jobs, and notifications
-->
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Hirer Dashboard — KelasaGaara</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+Tamma+2:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',sans-serif;background:var(--paper);min-height:100vh}
    .navbar{background:#fff;border-bottom:1px solid var(--border);padding:0 28px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,0.06)}
    .brand{font-family:'Baloo Tamma 2',sans-serif;font-weight:800;font-size:1.1rem;color:var(--ink);text-decoration:none}
    .brand span{color:var(--saffron)}
    .nav-right{display:flex;align-items:center;gap:10px}
    .nav-avatar{width:34px;height:34px;border-radius:50%;object-fit:cover;border:2px solid var(--saffron)}
    .nav-name{font-size:0.85rem;font-weight:600;color:var(--ink)}
    .btn-sm{padding:6px 14px;border-radius:8px;font-size:0.8rem;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;border:none;transition:all 0.2s;text-decoration:none;display:inline-flex;align-items:center;gap:4px}
    .btn-outline{background:transparent;border:1.5px solid var(--border);color:var(--muted)}
    .btn-outline:hover{border-color:var(--saffron);color:var(--saffron)}
    .btn-primary{background:var(--saffron);color:#fff}
    .btn-primary:hover{background:#C04E06}
    .layout{max-width:1050px;margin:28px auto;padding:0 24px}
    .tabs{display:flex;gap:4px;margin-bottom:24px;background:#fff;border:1px solid var(--border);border-radius:12px;padding:4px;flex-wrap:wrap}
    .tab{padding:8px 18px;border-radius:8px;font-size:0.85rem;font-weight:600;cursor:pointer;border:none;background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;transition:all 0.2s}
    .tab.active{background:var(--saffron);color:#fff}
    .tab-pane{display:none}.tab-pane.active{display:block}
    .profile-block{display:flex;align-items:center;gap:1rem;padding:1.5rem;background:#fff;border-radius:16px;border:1px solid var(--border);box-shadow:0 2px 12px rgba(0,0,0,0.06);margin-bottom:1.5rem}
    .profile-avatar{width:64px;height:64px;border-radius:50%;border:3px solid var(--saffron);object-fit:cover;flex-shrink:0}
    .booking-card{background:#fff;border:1px solid var(--border);border-radius:14px;padding:16px 18px;margin-bottom:12px;transition:box-shadow 0.2s}
    .booking-card:hover{box-shadow:0 6px 20px rgba(0,0,0,0.08)}
    .booking-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:8px}
    .booking-title{font-weight:700;font-size:0.95rem;color:var(--ink);margin-bottom:3px}
    .booking-meta{font-size:0.8rem;color:var(--muted);line-height:1.7}
    .empty{text-align:center;padding:40px 20px;color:var(--muted);font-size:0.88rem}
    .hirer-jobs-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
    .hirer-job-card{background:#fff;border:1px solid var(--border);border-radius:14px;padding:16px;transition:all 0.2s}
    .hirer-job-card:hover{box-shadow:0 6px 20px rgba(0,0,0,0.08);transform:translateY(-2px)}
    .hjc-title{font-family:'Baloo Tamma 2',cursive;font-size:1.02rem;font-weight:700;color:var(--ink);margin-bottom:4px}
    .hjc-meta{font-size:0.82rem;color:var(--muted);line-height:1.6}
    .hjc-pay{font-family:'Baloo Tamma 2',cursive;font-size:1.2rem;color:var(--jade,#1B6B45);font-weight:700;margin:6px 0}
    .hjc-footer{display:flex;align-items:center;justify-content:space-between;padding-top:10px;border-top:1px solid var(--border);margin-top:8px}
  </style>
</head>
<body>
<nav class="navbar">
  <a href="index.html" class="brand">Kelasa<span>Gaara</span></a>
  <div class="nav-right">
    <div id="notif-bell-container"></div>
    <img id="nav-avatar" class="nav-avatar" src="" alt="" onerror="this.style.display='none'"/>
    <span class="nav-name" id="nav-name"></span>
    <a href="index.html" class="btn-sm btn-primary">Browse Workers</a>
    <button class="btn-sm btn-outline" onclick="doLogout()">Logout</button>
  </div>
</nav>

<div class="layout">
  <div class="profile-block">
    <img class="profile-avatar" id="user-photo" src="" alt=""/>
    <div>
      <h3 id="user-name" style="font-family:'Baloo Tamma 2',cursive;font-size:1.15rem;margin-bottom:2px">Loading…</h3>
      <p id="user-email" style="font-size:0.82rem;color:var(--muted)"></p>
      <span style="display:inline-flex;align-items:center;gap:5px;padding:3px 12px;border-radius:20px;font-size:0.75rem;font-weight:600;background:rgba(232,89,12,0.1);color:var(--saffron);margin-top:6px">🏗️ Hirer</span>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('bookings',this)">📋 My Bookings</button>
    <button class="tab" onclick="switchTab('jobs',this)">💼 Posted Jobs</button>
    <button class="tab" onclick="switchTab('profile',this)">👤 Profile</button>
  </div>

  <div id="tab-bookings" class="tab-pane active">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <strong style="font-family:'Baloo Tamma 2',cursive;font-size:1rem">My Worker Bookings</strong>
      <a href="index.html" class="btn-sm btn-primary">+ Book a Worker</a>
    </div>
    <div id="bookings-list"><div class="empty">⏳ Loading bookings…</div></div>
  </div>

  <div id="tab-jobs" class="tab-pane">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <strong style="font-family:'Baloo Tamma 2',cursive;font-size:1rem">My Posted Jobs</strong>
      <a href="post-job.html" class="btn-sm btn-primary">+ Post New Job</a>
    </div>
    <div id="jobs-list"><div class="empty">⏳ Loading…</div></div>
  </div>

  <div id="tab-profile" class="tab-pane">
    <div style="background:#fff;border:1px solid var(--border);border-radius:14px;padding:20px">
      <p style="color:var(--muted);font-size:0.88rem">Your profile is managed via Google Sign-In. Name and photo update through your Google account.</p>
    </div>
  </div>
</div>

<div id="toast-container"></div>

<script type="module">
  import { auth, db } from './js/firebase-config.js';
  import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { doc, getDoc, collection, query, where, getDocs }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  import { initNotificationBell } from './js/notifications-ui.js';

  function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

  onAuthStateChanged(auth, async user => {
    if (!user) { window.location.href='login.html'; return; }
    const snap = await getDoc(doc(db,'users',user.uid));
    if (!snap.exists() || snap.data().role !== 'hirer') { window.location.href='login.html'; return; }
    const u = { uid: user.uid, ...snap.data() };

    document.getElementById('nav-avatar').src        = u.photo || '';
    document.getElementById('nav-name').textContent  = (u.name||'').split(' ')[0];
    document.getElementById('user-photo').src        = u.photo || '';
    document.getElementById('user-name').textContent = u.name || 'Hirer';
    document.getElementById('user-email').textContent= u.email || '';

    initNotificationBell(user.uid, 'notif-bell-container');
    loadBookings(user.uid);
    loadJobs(user.uid);
  });

  async function loadBookings(uid) {
    const el = document.getElementById('bookings-list');
    try {
      const q    = query(collection(db,'bookings'), where('hirerId','==', uid));
      const snap = await getDocs(q);
      if (snap.empty) {
        el.innerHTML = '<div class="empty">📭 No bookings yet. <a href="index.html" style="color:var(--saffron)">Browse workers →</a></div>';
        return;
      }
      const items = snap.docs.map(d=>({id:d.id,...d.data()}));
      items.sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));
      el.innerHTML = '';
      for (const b of items) {
        let workerName='Worker';
        try{const ws=await getDoc(doc(db,'users',b.workerId));if(ws.exists())workerName=ws.data().name||'Worker';}catch(e){}
        const stClass = `status-${(b.status||'PENDING').toLowerCase()}`;
        const card = document.createElement('div'); card.className='booking-card';
        card.innerHTML = `
          <div class="booking-top">
            <div>
              <div class="booking-title">💼 ${esc(b.jobTitle)}</div>
              <div class="booking-meta">👷 Worker: <strong>${esc(workerName)}</strong><br>📅 ${b.date||'—'} at ${b.time||'—'}<br>📍 ${esc(b.location)}</div>
            </div>
            <span class="${stClass}">${b.status||'PENDING'}</span>
          </div>
          ${b.instructions?`<div style="font-size:0.8rem;color:var(--muted);margin-top:4px">📝 ${esc(b.instructions)}</div>`:''}
          <div style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap">
            ${b.status!=='EXPIRED'?`<button class="btn-sm btn-primary" onclick="window.location.href='chat.html?booking=${b.id}'">💬 Open Chat</button>`:''}
            <a href="booking-detail.html?id=${b.id}" class="btn-sm btn-outline">View Details</a>
          </div>`;
        el.appendChild(card);
      }
    } catch(e) { console.error(e); el.innerHTML='<div class="empty">Could not load bookings.</div>'; }
  }

  async function loadJobs(uid) {
    const el = document.getElementById('jobs-list');
    try {
      const q    = query(collection(db,'jobs'), where('hirerUid','==', uid));
      const snap = await getDocs(q);
      if (snap.empty) {
        el.innerHTML='<div class="empty">📭 No jobs posted. <a href="post-job.html" style="color:var(--saffron)">Post one →</a></div>'; return;
      }
      const grid = document.createElement('div'); grid.className='hirer-jobs-grid';
      snap.docs.forEach(d=>{
        const j=d.data();
        const card=document.createElement('div'); card.className='hirer-job-card';
        card.innerHTML=`
          <div class="hjc-title">💼 ${esc(j.title)}</div>
          <div class="hjc-meta">📍 ${esc(j.district)} &nbsp;|&nbsp; 🏷️ ${esc(j.category)}</div>
          <div class="hjc-pay">₹${j.pay}/day</div>
          <div class="hjc-footer">
            <span class="${j.status==='open'?'status-confirmed':'status-declined'}">${j.status==='open'?'🟢 Open':'🔴 Closed'}</span>
            <span style="font-size:0.78rem;color:var(--muted)">👥 ${(j.applicants||[]).length} applicants</span>
          </div>`;
        grid.appendChild(card);
      });
      el.innerHTML=''; el.appendChild(grid);
    } catch(e) { el.innerHTML='<div class="empty">Could not load jobs.</div>'; }
  }

  window.switchTab = function(tab, btn) {
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-'+tab).classList.add('active');
  };
  window.doLogout = async () => { await signOut(auth); window.location.href='login.html'; };
</script>
</body>
</html>
